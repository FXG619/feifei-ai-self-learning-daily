- id: "reading-evidence"
  title: "阅读：找原文依据"
  category: "判断力"
  english_focus: "阅读"
  one_action: "先找到一句原文依据，再判断选项。"
  student_action: "做细节题时，先把支持答案的原文句子划出来，用自己的话说一遍，再看选项。"
  parent_question: "你选这个答案，原文哪句话支持你？"
  ai_prompt: "请做我的中考英语阅读陪练。不要告诉我答案。我会给你题干、依据句和我的选择，请你检查依据句是否能支持我的选择。"
  risk_note: "不要让 AI 替孩子通读全文并给出选项。"

- id: "reading-transition-words"
  title: "阅读：识别转折词"
  category: "判断力"
  english_focus: "阅读"
  one_action: "在一段话里圈出 but、however、although 这类转折信号。"
  student_action: "找一段阅读材料，圈出转折词，并写下转折前后意思有什么变化。"
  parent_question: "这句话转折以后，作者真正想强调哪一边？"
  ai_prompt: "请不要直接翻译整段。请根据我圈出的转折词，追问我转折前后意思有什么变化，并帮我检查我的理解是否合理。"
  risk_note: "不要让 AI 直接替孩子翻译全文。"

- id: "reading-author-attitude"
  title: "阅读：判断作者态度"
  category: "判断力"
  english_focus: "阅读"
  one_action: "找出一个能体现作者态度的形容词或评价句。"
  student_action: "读完一段后，写下作者是支持、反对、担心还是建议，并用一个原文词或句子证明。"
  parent_question: "你怎么知道作者是这个态度？原文有没有提示词？"
  ai_prompt: "请不要告诉我作者态度。请根据我找到的词或句子，问我一个问题，帮助我判断这个证据是否能说明作者态度。"
  risk_note: "不要让 AI 直接替孩子贴标签，孩子要先给证据。"

- id: "reading-fact-opinion"
  title: "阅读：区分事实和观点"
  category: "判断力"
  english_focus: "阅读"
  one_action: "把一句话标成事实或观点，并说出理由。"
  student_action: "从阅读文章里选两句话，判断哪句是事实、哪句是观点，并解释判断依据。"
  parent_question: "这句话是在说发生了什么，还是在表达看法？"
  ai_prompt: "请不要直接给分类。我会说出我的判断和理由，请你追问我一句，帮助我检查事实和观点有没有混淆。"
  risk_note: "不要让 AI 直接完成分类表。"

- id: "reading-cause-effect"
  title: "阅读：找因果关系"
  category: "判断力"
  english_focus: "阅读"
  one_action: "圈出 because、so、as a result 等因果信号。"
  student_action: "在一段阅读里找一个原因和一个结果，并用箭头连起来。"
  parent_question: "这件事为什么发生？结果是什么？"
  ai_prompt: "请根据我找出的原因和结果，检查它们是否真的对应。不要直接替我总结整段，只追问我哪里体现了因果关系。"
  risk_note: "不要让 AI 直接给整段逻辑图。"

- id: "reading-main-idea"
  title: "阅读：概括段落主旨"
  category: "产出力"
  english_focus: "阅读"
  one_action: "用一句中文概括一段话的主旨。"
  student_action: "读一段后，先划掉例子和细节，只留下这段最想说明的一句话。"
  parent_question: "如果只能用一句话讲这段，它主要在说什么？"
  ai_prompt: "请不要替我概括。我会先写一句主旨，请你判断它是否太宽或太细，并追问我如何改得更准确。"
  risk_note: "不要让 AI 直接输出段落主旨给孩子背。"

- id: "cloze-context-logic"
  title: "完形：先看上下文逻辑"
  category: "判断力"
  english_focus: "完形"
  one_action: "先读空格前后两句，再选词。"
  student_action: "遇到完形空格时，不急着看选项，先写出前后句之间是顺承、转折还是因果。"
  parent_question: "这个空前后两句是什么关系？"
  ai_prompt: "请不要告诉我选哪个。我会说出空格前后的逻辑关系，请你检查这个关系是否合理，并追问我一个依据。"
  risk_note: "不要让 AI 直接代选完形答案。"

- id: "cloze-emotion-color"
  title: "完形：识别情绪色彩"
  category: "判断力"
  english_focus: "完形"
  one_action: "判断空格所在句子的情绪是积极、消极还是中性。"
  student_action: "先找句子里的情绪线索，再排除情绪不匹配的选项。"
  parent_question: "这句话的情绪是开心、担心，还是普通描述？"
  ai_prompt: "请不要直接选答案。我会告诉你我判断的情绪色彩，请你追问我句子里哪个词支持这个判断。"
  risk_note: "不要让 AI 替孩子一次性分析整篇完形。"

- id: "cloze-collocation"
  title: "完形：判断前后搭配"
  category: "判断力"
  english_focus: "完形"
  one_action: "检查空格前后的固定搭配或常见表达。"
  student_action: "把空格前后各三个词读出来，判断哪个选项和周围词搭配更自然。"
  parent_question: "这个词和前后的词放在一起顺不顺？"
  ai_prompt: "请不要告诉我答案。我会写出我认为可能的搭配，请你检查搭配是否自然，并提示我再看哪个词。"
  risk_note: "不要让 AI 直接给出固定搭配清单让孩子照抄。"

- id: "writing-expand-reason"
  title: "作文：扩写原因句"
  category: "产出力"
  english_focus: "作文"
  one_action: "把一个简单原因句扩成“原因 + 例子”的两句。"
  student_action: "先写一句原因，再补一个真实小例子，让句子更具体。"
  parent_question: "你这个原因能不能加一个自己的例子？"
  ai_prompt: "请不要替我写作文。我会给你一个原因句，请你追问我一个生活例子，帮助我把原因写具体。"
  risk_note: "不要让 AI 代写整段作文。"

- id: "writing-ai-asks-detail"
  title: "作文：让 AI 追问细节"
  category: "提问力"
  english_focus: "作文"
  one_action: "写两句自己的内容，再请 AI 只追问一个细节。"
  student_action: "围绕作文题写出观点和原因，让 AI 追问一个能补充细节的问题。"
  parent_question: "AI 追问以后，你补充了哪个细节？"
  ai_prompt: "请不要替我写。请读我写的两句话，只追问一个能让我表达更具体的问题。"
  risk_note: "不要复制 AI 生成的整段内容。"

- id: "writing-replace-basic-expression"
  title: "作文：替换低级表达"
  category: "产出力"
  english_focus: "作文"
  one_action: "只替换一个重复或太笼统的表达。"
  student_action: "从自己的作文里找一个反复出现的词，比如 good 或 important，尝试换成更准确的表达。"
  parent_question: "这个词有没有更准确一点的说法？"
  ai_prompt: "请不要重写我的句子。我会给你一个词和原句，请你给 2 个更准确的选择，并问我哪一个最符合我的意思。"
  risk_note: "不要让 AI 整篇润色到不像孩子自己的表达。"

- id: "writing-logic-order"
  title: "作文：检查逻辑顺序"
  category: "判断力"
  english_focus: "作文"
  one_action: "检查三句话的顺序是否清楚。"
  student_action: "把作文里的三句话标成观点、原因、例子，看顺序是否自然。"
  parent_question: "这三句话的顺序，别人读起来会不会顺？"
  ai_prompt: "请不要改写句子。我会给你三句话，请你判断它们的顺序是否清楚，并追问我一句为什么这样排。"
  risk_note: "不要让 AI 直接重排并重写全文。"

- id: "vocab-three-real-sentences"
  title: "词汇：用单词造 3 个真实句子"
  category: "产出力"
  english_focus: "词汇"
  one_action: "用一个单词写 3 个和自己生活有关的句子。"
  student_action: "选一个中考词，分别写学校、家庭、周末三个小场景句。"
  parent_question: "这三个句子里，哪一句最像你自己的生活？"
  ai_prompt: "请不要替我造句。我会给你 3 个句子，请你指出哪一句最自然，并追问我如何把另外两句写具体。"
  risk_note: "不要让 AI 批量生成句子给孩子背。"

- id: "vocab-near-synonyms"
  title: "词汇：让 AI 区分近义词"
  category: "判断力"
  english_focus: "词汇"
  one_action: "比较两个近义词在一个句子里的差别。"
  student_action: "选两个容易混的词，先写出自己的区别理解，再让 AI 检查。"
  parent_question: "这两个词差在哪里？你能举一个小例子吗？"
  ai_prompt: "请不要直接给我完整讲解。我会先说出两个词的区别，请你检查哪里不准确，并追问我一个例句。"
  risk_note: "不要让 AI 输出长篇词义辨析让孩子直接背。"

- id: "vocab-mini-scene"
  title: "词汇：用一个词做小场景"
  category: "产出力"
  english_focus: "词汇"
  one_action: "围绕一个单词写一个两句话小场景。"
  student_action: "选一个词，写出人物、地点和动作，组成一个很短的小场景。"
  parent_question: "这个词放进场景以后，你是不是更容易记住？"
  ai_prompt: "请不要替我写小场景。我会先写两句话，请你问我一个问题，帮助我把人物或地点写清楚。"
  risk_note: "不要让 AI 替孩子完成所有造句。"

- id: "grammar-example-first"
  title: "语法：用例句理解语法"
  category: "判断力"
  english_focus: "语法"
  one_action: "先看一个例句，再说出语法规律。"
  student_action: "找一个语法点，先写一个例句，再用自己的话说规律。"
  parent_question: "你能不能先举一个句子，再说规则？"
  ai_prompt: "请不要直接讲完整语法课。我会给你一个例句和我的规律总结，请你检查是否准确，并追问我一个反例。"
  risk_note: "不要让 AI 输出大段语法说明让孩子被动看。"

- id: "listening-predict-keywords"
  title: "听力：预测题干关键词"
  category: "目标力"
  english_focus: "听力"
  one_action: "听前先预测 2 个可能会听到的关键词。"
  student_action: "看题干，猜人物、地点、时间或动作关键词，听完后核对。"
  parent_question: "你听之前预测了哪两个关键词？"
  ai_prompt: "请不要告诉我答案。我会给你题干和预测关键词，请你检查预测是否合理，并提醒我听时关注什么。"
  risk_note: "不要让 AI 直接判断听力选项。"

- id: "listening-circle-keywords"
  title: "听力：听前圈关键词"
  category: "执行力"
  english_focus: "听力"
  one_action: "听前圈出题干里的时间、地点、人物或动作词。"
  student_action: "播放前用 20 秒圈关键词，听的时候只先抓这些信号。"
  parent_question: "你圈出来的词，听的时候抓到了几个？"
  ai_prompt: "请根据我圈出的关键词，问我一个听前检查问题，帮助我确认听的时候先抓什么。"
  risk_note: "不要把听力训练变成只看文字猜答案。"

- id: "listening-retell-one-sentence"
  title: "听力：听后复述一句话"
  category: "产出力"
  english_focus: "听力"
  one_action: "听完后只复述一句听到的大意。"
  student_action: "听一小段材料后，不急着看答案，先用中文或英文说一句大意。"
  parent_question: "你能用一句话说刚才主要听到了什么吗？"
  ai_prompt: "请不要给我原文。我会写一句复述，请你判断大意是否清楚，并追问我一个没听清的细节。"
  risk_note: "不要让 AI 直接提供听力原文来替代听。"

- id: "mistake-why-wrong"
  title: "错题：写出“我当时为什么错”"
  category: "复盘力"
  english_focus: "错题"
  one_action: "把一道错题的错因写成一句具体话。"
  student_action: "回看一道错题，写清楚当时是没看懂词、漏了依据、语法混淆，还是表达不清。"
  parent_question: "你当时为什么会这样想？"
  ai_prompt: "请不要重新讲题。我会写出我的错因，请你判断是否具体，并追问我一个问题。"
  risk_note: "不要让 AI 直接生成错题本内容。"

- id: "mistake-explain-to-ai"
  title: "错题：把一道错题讲给 AI 听"
  category: "复盘力"
  english_focus: "错题"
  one_action: "用自己的话把错题讲给 AI 听。"
  student_action: "说清题目考什么、自己原来怎么想、现在哪里要改。"
  parent_question: "你能不能不看解析，把这道题讲清楚？"
  ai_prompt: "请听我讲一道错题。不要补充答案，只判断我有没有讲清楚题目考点、原想法和要修改的地方。"
  risk_note: "不要让 AI 替孩子讲题，孩子要先说。"

- id: "mistake-type"
  title: "错题：判断错因类型"
  category: "复盘力"
  english_focus: "错题"
  one_action: "把错因归到一个类型：词汇、语法、审题、依据、表达。"
  student_action: "给一道错题贴一个错因标签，并写一句具体说明。"
  parent_question: "这次错，是哪一类问题最明显？"
  ai_prompt: "我会给你一道错题的错因说明。请不要讲答案，只帮我判断这个错因更像哪一类，并追问我依据。"
  risk_note: "不要把错因标签当成责备，只用于下次提醒。"

- id: "review-weekly-one-error"
  title: "复盘：一周找一个高频错因"
  category: "复盘力"
  english_focus: "复盘"
  one_action: "从一周错题里找一个最常见错因。"
  student_action: "挑 3 道错题，分别写错因，再选出出现最多的一类。"
  parent_question: "这一周最常出现的错因是什么？"
  ai_prompt: "请不要评价我的水平。我会列 3 个错因，请你帮我找共同点，并追问我下周准备提醒自己什么。"
  risk_note: "不要把复盘变成焦虑总结，只找一个可改点。"

- id: "review-next-reminder"
  title: "复盘：让 AI 帮我整理下次提醒"
  category: "复盘力"
  english_focus: "复盘"
  one_action: "把一个错因改成一句下次做题前的提醒。"
  student_action: "例如把“总是漏转折”改成“看到 but 后先看后半句”。"
  parent_question: "下次做题前，你要提醒自己哪一句？"
  ai_prompt: "请根据我写的错因，帮我检查这句下次提醒是否具体。如果不具体，请追问我一个问题，不要直接替我写完。"
  risk_note: "不要让 AI 生成一长串提醒，今天只留一句。"

- id: "plan-ten-minute-task"
  title: "计划：今天只定一个 10 分钟任务"
  category: "目标力"
  english_focus: "计划"
  one_action: "把今天的英语学习缩小成一个 10 分钟任务。"
  student_action: "只写一个任务，比如复盘一道错题、听一段材料、造 3 个句子。"
  parent_question: "今天 10 分钟只做哪一件事？"
  ai_prompt: "请不要给我一整套学习计划。我会告诉你我今天的状态，请你追问我一个问题，帮我定一个 10 分钟小任务。"
  risk_note: "不要让 AI 安排过满计划，避免孩子无法启动。"

- id: "plan-split-big-goal"
  title: "计划：把大目标拆成一个小动作"
  category: "目标力"
  english_focus: "计划"
  one_action: "把“提高英语”拆成今天能做的一步。"
  student_action: "写下一个大目标，再把它改成今天可完成的一个动作。"
  parent_question: "这个目标今天能从哪一步开始？"
  ai_prompt: "请不要给我长期计划。我会说一个大目标，请你追问我现在最卡在哪里，并帮我把它缩成一个小动作。"
  risk_note: "不要把计划做成压力清单。"

- id: "question-ask-me-first"
  title: "提问：把“帮我讲一下”改成“请先问我”"
  category: "提问力"
  english_focus: "提问"
  one_action: "把一个笼统问题改成让 AI 先追问自己的问题。"
  student_action: "把“帮我讲一下这题”改成“请先问我一个问题，检查我哪里没想清楚”。"
  parent_question: "你能不能先让 AI 问你，而不是先让 AI 讲？"
  ai_prompt: "请先不要讲解。请先问我一个问题，帮助我说出我现在卡在哪里。"
  risk_note: "不要让 AI 一上来就长篇讲解，孩子要先表达卡点。"

- id: "judgment-ai-needs-evidence"
  title: "判断：让 AI 给出依据而不是只给答案"
  category: "判断力"
  english_focus: "判断"
  one_action: "要求 AI 检查依据，但不直接给最终结论。"
  student_action: "先说自己的判断和依据，再让 AI 检查依据是否足够。"
  parent_question: "AI 说得有道理吗？它有没有指出依据？"
  ai_prompt: "请不要只说对或错。我会给出我的判断和依据，请你检查依据是否充分，并追问我哪里还需要证明。"
  risk_note: "不要只看 AI 的结论，要看它是否帮助孩子检查依据。"

- id: "output-three-sentences"
  title: "产出：把今天学到的内容写成 3 句话"
  category: "产出力"
  english_focus: "产出"
  one_action: "用 3 句话写下今天学到了什么。"
  student_action: "写一句知识点、一句例子、一句下次提醒。"
  parent_question: "今天学完以后，你能留下哪 3 句话？"
  ai_prompt: "请不要替我总结。我会写 3 句话，请你检查是否分别包含知识点、例子和下次提醒。"
  risk_note: "不要让 AI 代写总结，孩子要先产出。"
