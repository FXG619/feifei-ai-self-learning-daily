- day_number: 1
  title: "不要问 AI 要答案，要让 AI 追问你"
  category: "提问力"
  english_focus: "阅读"
  one_action: "先写下自己的选择和理由，再请 AI 只追问一个问题。"
  student_action: "找一道阅读题，先说“我选了什么、我为什么这样选”，再根据 AI 的追问回到原文找证据。"
  parent_question: "AI 追问你的那个问题，有没有帮你回到原文里找依据？"
  ai_prompt: "你是我的中考英语阅读陪练。请先不要告诉我正确答案。我会告诉你我的选择和理由，请你只追问我一个问题，帮助我检查理由是否站得住。"
  risk_note: "不要要求 AI 给最终答案，也不要让 AI 替孩子完成整题。"

- day_number: 2
  title: "阅读题先找原文依据，再看选项"
  category: "判断力"
  english_focus: "阅读"
  one_action: "读题后先圈出一处原文依据，再回头看选项。"
  student_action: "选一题细节理解题，先找到支持答案的原文句子，用自己的话说出它的意思，再判断哪个选项最贴近。"
  parent_question: "你选这个答案前，原文里哪句话支持你？"
  ai_prompt: "你是我的中考英语阅读陪练。请不要告诉我选哪个。我会给你题干、我找到的原文依据和我的选择，请你帮我检查依据和选择是否对应。"
  risk_note: "不要让 AI 直接代替孩子读文章和选答案。"

- day_number: 3
  title: "错题不是抄答案，而是找错因"
  category: "复盘力"
  english_focus: "错题"
  one_action: "只复盘一道错题，把“我为什么错”写成一句具体的话。"
  student_action: "拿一道最近的错题，先写出原来的想法，再判断错因是词义、语法、审题、依据还是表达问题。"
  parent_question: "这道题不是简单粗心，更具体一点是哪里没看清？"
  ai_prompt: "你是我的中考英语错题复盘教练。请不要重讲整道题。我会告诉你我的错因，请你判断这个错因是否具体，并只追问一个问题。"
  risk_note: "不要让 AI 输出一整段解析给孩子照抄。"

- day_number: 4
  title: "背单词不是背中文，而是造场景句"
  category: "产出力"
  english_focus: "词汇"
  one_action: "选 1 个单词，写 3 个和自己生活有关的短句。"
  student_action: "从今天的词表里选一个词，分别写出学校、家庭、考试三个小场景句，再让 AI 检查是否自然。"
  parent_question: "这个单词你能不能放进一个自己的真实场景里？"
  ai_prompt: "你是我的中考英语词汇陪练。请不要直接替我造句。我会先写 3 个句子，请你指出哪一句最自然，并追问我如何把不自然的句子改具体。"
  risk_note: "不要让 AI 直接替孩子批量造句，孩子必须先写自己的句子。"

- day_number: 5
  title: "作文不是让 AI 代写，而是让 AI 追问表达"
  category: "提问力"
  english_focus: "作文"
  one_action: "先写 2 句自己的作文内容，再让 AI 追问一个细节。"
  student_action: "围绕一个作文题，先写出自己的观点句和原因句，再请 AI 追问一个能让表达更具体的问题。"
  parent_question: "AI 追问以后，你有没有把原来的句子写得更像你自己的经历？"
  ai_prompt: "你是我的中考英语写作陪练。请不要替我写作文。我会给你两句我自己写的话，请你只追问一个细节问题，帮助我把表达写具体。"
  risk_note: "不要让 AI 代写作文，也不要直接复制 AI 的句子当成自己的作文。"

- day_number: 6
  title: "听力不是盲听，而是先预测关键词"
  category: "目标力"
  english_focus: "听力"
  one_action: "听前先看题干，圈出 2 个可能会听到的关键词。"
  student_action: "做一小段听力前，先根据题干猜测人物、时间、地点或动作关键词，听完后核对自己是否听到了这些词。"
  parent_question: "你听之前预测了哪两个关键词？最后真的听到了吗？"
  ai_prompt: "你是我的中考英语听力陪练。请不要给我答案。我会给你题干和我预测的关键词，请你帮我检查预测是否合理，并提醒我听的时候关注什么。"
  risk_note: "不要让 AI 直接替孩子判断听力答案，重点是听前预测和听后核对。"

- day_number: 7
  title: "一周复盘：我最常见的错因是什么"
  category: "复盘力"
  english_focus: "复盘"
  one_action: "回看本周 3 道错题，找出一个最常见错因。"
  student_action: "挑 3 道本周错题，分别写下错因，再把最常出现的一类错因写成下周提醒。"
  parent_question: "这一周你最常见的错因是什么？下周做题前你想提醒自己哪一句？"
  ai_prompt: "你是我的中考英语复盘陪练。请不要替我总结成绩。我会列出 3 个错因，请你帮我找共同点，并追问我下周要用哪一句提醒自己。"
  risk_note: "不要把复盘做成排名或压力总结，只找一个可改的小提醒。"
